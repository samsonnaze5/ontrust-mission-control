version: '3'

tasks:
  default:
    silent: true
    cmds:
      - task --list

  schemas:install:
    desc: Install Python dependencies for the schema extractor
    cmds:
      - pip3 install -r scripts/requirements.txt

  schemas:extract:
    desc: Extract DB schemas → artifacts/schemas/ (reads .env at repo root)
    cmds:
      - python3 scripts/extract_schemas.py

  schemas:clean:
    desc: Remove generated artifacts/schemas/
    cmds:
      - rm -rf artifacts/schemas

  schemas:refresh:
    desc: Clean then extract — fresh run for ALL 8 DBs, drops stale per-table CSVs
    cmds:
      - task: schemas:clean
      - task: schemas:extract

  schemas:refresh:db:
    desc: 'Refresh one DB only (no clean) — usage: task schemas:refresh:db -- crm_financial'
    cmds:
      - python3 scripts/extract_schemas.py --only {{.CLI_ARGS}}

  schemas:diff:
    desc: 'Semantic diff for one DB schema — usage: task schemas:diff -- crm_financial [--base HEAD~1]'
    cmds:
      - python3 scripts/schema_diff.py {{.CLI_ARGS}}

  enums:extract:
    desc: Extract enum values from Go code → artifacts/schemas/<db>/enums/<table>.csv
    cmds:
      - python3 scripts/extract_enums.py

  entrypoints:refresh:
    desc: Re-extract cmd/* entry points → artifacts/entrypoints.csv (+ meta). Excludes kind=tool.
    cmds:
      - python3 scripts/extract_entrypoints.py

  entrypoints:check:
    desc: Dry-run — exit 1 if entrypoints.csv would change (use in CI)
    cmds:
      - python3 scripts/extract_entrypoints.py --check
